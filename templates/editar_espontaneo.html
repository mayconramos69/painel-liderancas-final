{% extends "base.html" %}{% block content %}<header class="topbar"><strong>Editar espontâneo</strong><div><a class="btn yellow" href="{{ url_for('admin') }}">Voltar</a></div></header><main class="container"><div class="card"><h2>Editar cadastro espontâneo</h2><p class="muted">Liderança responsável: {{ item.lideranca_nome }}</p><form method="post"><label>Nome completo</label><input name="nome_completo" value="{{ item.nome_completo }}" required><label>Município</label><input name="municipio" value="{{ item.municipio }}" required><label>Telefone</label><input name="telefone" value="{{ item.telefone }}"><label>Endereço completo</label><input name="endereco_completo" value="{{ item.endereco_completo }}"><button class="btn fullbtn" type="submit">Salvar alterações</button></form></div></main>{% endblock %}
