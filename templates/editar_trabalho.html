{% extends "base.html" %}{% block content %}<header class="topbar"><strong>Editar trabalho</strong><div><a class="btn yellow" href="{{ url_for('admin') }}">Voltar</a></div></header><main class="container"><div class="card"><h2>Editar cadastro de trabalho</h2><p class="muted">Liderança responsável: {{ item.lideranca_nome }}</p><form method="post"><label>Nome</label><input name="nome" value="{{ item.nome }}" required><label>Município</label><input name="municipio" value="{{ item.municipio }}" required><label>Nome do colégio</label><input name="colegio" value="{{ item.colegio }}"><label>Endereço</label><input name="endereco" value="{{ item.endereco }}"><label>Telefone</label><input name="telefone" value="{{ item.telefone }}"><div class="grid2"><div><label>Zona</label><input name="zona" value="{{ item.zona }}"></div><div><label>Seção</label><input name="secao" value="{{ item.secao }}"></div></div><label>Número do título</label><input name="numero_titulo" value="{{ item.numero_titulo }}"><button class="btn fullbtn" type="submit">Salvar alterações</button></form></div></main>{% endblock %}
